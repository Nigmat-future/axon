<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Axon local-first LLM router</title>
  <desc id="desc">A dark editorial banner showing Axon as a neuron: dendrites collect local provider signals, an axon carries routed traffic, and synaptic terminals fan out to model providers.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0F12"/>
      <stop offset="0.48" stop-color="#11151A"/>
      <stop offset="1" stop-color="#1A1710"/>
    </linearGradient>
    <linearGradient id="signal" x1="118" y1="86" x2="1074" y2="329" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#74D3AE"/>
      <stop offset="0.38" stop-color="#E6C86E"/>
      <stop offset="0.72" stop-color="#F28E8E"/>
      <stop offset="1" stop-color="#8EA7FF"/>
    </linearGradient>
    <linearGradient id="neurite" x1="94" y1="252" x2="1124" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#74D3AE"/>
      <stop offset="0.45" stop-color="#BEEFD7"/>
      <stop offset="0.74" stop-color="#F28E8E"/>
      <stop offset="1" stop-color="#8EA7FF"/>
    </linearGradient>
    <linearGradient id="axonText" x1="300" y1="112" x2="904" y2="255" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F3F6E8"/>
      <stop offset="0.48" stop-color="#BEEFD7"/>
      <stop offset="1" stop-color="#F1CC77"/>
    </linearGradient>
    <radialGradient id="pulse" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(609 212) rotate(88) scale(248 626)">
      <stop offset="0" stop-color="#74D3AE" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#E6C86E" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#0A0F12" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="somaGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(156 250) rotate(36) scale(78 58)">
      <stop offset="0" stop-color="#D8FFE9" stop-opacity="0.72"/>
      <stop offset="0.38" stop-color="#74D3AE" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#0A0F12" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-80%" width="140%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.455 0 0 0 0 0.827 0 0 0 0 0.682 0 0 0 0.55 0"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" stroke="#F3F6E8" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <style>
      .label { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 1.8px; fill: #C9D6C8; }
      .micro { font: 600 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 1px; fill: #8C9B91; }
      .terminal { font: 600 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #DCEBD8; }
      .neurite { stroke-linecap: round; stroke-linejoin: round; }
      .axon-core { stroke-dasharray: 28 22; animation: dash 13s linear infinite; }
      .dendrite { stroke-dasharray: 3 12; animation: dash 17s linear infinite; }
      .signal-line { stroke-dasharray: 12 18; animation: dash 7s linear infinite; }
      .signal-line.slow { animation-duration: 11s; }
      .node, .synapse { animation: throb 3.8s ease-in-out infinite; transform-origin: center; }
      .node.delay { animation-delay: 1.1s; }
      @keyframes dash { to { stroke-dashoffset: -240; } }
      @keyframes throb { 0%,100% { opacity: .78; } 50% { opacity: 1; } }
      @media (prefers-reduced-motion: reduce) {
        .signal-line, .axon-core, .dendrite, .node, .synapse { animation: none; }
      }
    </style>
  </defs>

  <rect width="1200" height="420" rx="0" fill="url(#panel)"/>
  <rect width="1200" height="420" fill="url(#grid)"/>
  <rect width="1200" height="420" fill="url(#pulse)"/>

  <g opacity="0.78">
    <path d="M154 252 C239 229 294 214 381 218 C518 224 613 260 739 222 C875 181 950 121 1085 84" stroke="url(#neurite)" stroke-width="17" stroke-opacity="0.09" class="neurite"/>
    <path d="M154 252 C239 229 294 214 381 218 C518 224 613 260 739 222 C875 181 950 121 1085 84" stroke="url(#neurite)" stroke-width="3.4" stroke-opacity="0.72" class="neurite axon-core"/>

    <ellipse cx="156" cy="250" rx="48" ry="36" fill="url(#somaGlow)"/>
    <ellipse cx="156" cy="250" rx="26" ry="19" fill="#10221B" stroke="#74D3AE" stroke-opacity="0.52" stroke-width="1.2"/>
    <path d="M136 251 C145 238 168 235 178 249 C170 263 145 266 136 251Z" fill="#74D3AE" fill-opacity="0.12" stroke="#BEEFD7" stroke-opacity="0.22"/>
    <circle cx="164" cy="245" r="4.4" fill="#BEEFD7" opacity="0.48" class="synapse"/>

    <path d="M139 239 C92 215 84 181 54 155" stroke="#74D3AE" stroke-width="2.2" stroke-opacity="0.46" class="neurite dendrite"/>
    <path d="M139 239 C102 240 83 258 54 272" stroke="#74D3AE" stroke-width="2.1" stroke-opacity="0.5" class="neurite dendrite"/>
    <path d="M150 224 C121 175 132 129 110 92" stroke="#BEEFD7" stroke-width="1.7" stroke-opacity="0.4" class="neurite dendrite"/>
    <path d="M171 233 C201 188 241 163 291 145" stroke="#E6C86E" stroke-width="1.8" stroke-opacity="0.38" class="neurite dendrite"/>
    <path d="M171 266 C213 299 236 337 287 360" stroke="#E6C86E" stroke-width="1.6" stroke-opacity="0.34" class="neurite dendrite"/>
    <path d="M128 262 C94 294 74 328 39 354" stroke="#74D3AE" stroke-width="1.8" stroke-opacity="0.42" class="neurite dendrite"/>
    <circle cx="54" cy="155" r="3.8" fill="#74D3AE" opacity="0.5"/>
    <circle cx="54" cy="272" r="4.2" fill="#74D3AE" opacity="0.58"/>
    <circle cx="110" cy="92" r="3.4" fill="#BEEFD7" opacity="0.45"/>
    <circle cx="291" cy="145" r="3.8" fill="#E6C86E" opacity="0.5"/>
    <circle cx="287" cy="360" r="3.4" fill="#E6C86E" opacity="0.42"/>

    <path d="M1085 84 C1122 58 1135 50 1162 42" stroke="#8EA7FF" stroke-width="2.1" stroke-opacity="0.55" class="neurite dendrite"/>
    <path d="M1085 84 C1128 102 1148 118 1174 146" stroke="#8EA7FF" stroke-width="1.8" stroke-opacity="0.42" class="neurite dendrite"/>
    <path d="M1085 84 C1108 128 1116 158 1139 203" stroke="#F28E8E" stroke-width="1.7" stroke-opacity="0.38" class="neurite dendrite"/>
    <circle cx="1162" cy="42" r="5" fill="#8EA7FF" opacity="0.75" class="synapse"/>
    <circle cx="1174" cy="146" r="4.2" fill="#8EA7FF" opacity="0.52" class="synapse"/>
    <circle cx="1139" cy="203" r="4.2" fill="#F28E8E" opacity="0.5" class="synapse"/>
  </g>

  <path d="M95 327 C227 242 282 306 408 211 C517 129 637 318 762 207 C889 95 958 173 1106 72" stroke="url(#signal)" stroke-width="2.2" stroke-linecap="round" opacity="0.72" class="signal-line"/>
  <path d="M92 116 C248 196 328 79 482 170 C641 264 692 89 848 154 C976 207 1014 292 1111 256" stroke="url(#signal)" stroke-width="1.4" stroke-linecap="round" opacity="0.42" class="signal-line slow"/>
  <path d="M176 286 C332 335 430 284 546 260 C667 234 750 270 885 318 C974 350 1049 333 1124 294" stroke="#E6C86E" stroke-width="1.1" stroke-linecap="round" opacity="0.32" class="signal-line slow"/>

  <g filter="url(#softGlow)">
    <circle cx="143" cy="300" r="7" fill="#74D3AE" class="node"/>
    <circle cx="417" cy="211" r="8" fill="#E6C86E" class="node delay"/>
    <circle cx="760" cy="207" r="7" fill="#F28E8E" class="node"/>
    <circle cx="1058" cy="96" r="8" fill="#8EA7FF" class="node delay"/>
  </g>

  <g opacity="0.92">
    <rect x="82" y="67" width="174" height="54" rx="0" fill="#0C1114" stroke="#74D3AE" stroke-opacity="0.42"/>
    <text x="104" y="92" class="label">SCAN</text>
    <text x="104" y="110" class="micro">env + configs</text>

    <rect x="82" y="135" width="174" height="54" rx="0" fill="#0C1114" stroke="#E6C86E" stroke-opacity="0.42"/>
    <text x="104" y="160" class="label">FINGERPRINT</text>
    <text x="104" y="178" class="micro">never raw keys</text>

    <rect x="944" y="238" width="174" height="54" rx="0" fill="#0C1114" stroke="#F28E8E" stroke-opacity="0.42"/>
    <text x="966" y="263" class="label">DUAL INGRESS</text>
    <text x="966" y="281" class="micro">openai + anthropic</text>

    <rect x="944" y="306" width="174" height="54" rx="0" fill="#0C1114" stroke="#8EA7FF" stroke-opacity="0.42"/>
    <text x="966" y="331" class="label">LOCALHOST</text>
    <text x="966" y="349" class="micro">127.0.0.1:4000</text>
  </g>

  <text x="302" y="186" font-family="Arial Black, Impact, ui-sans-serif, system-ui, sans-serif" font-size="116" font-weight="900" letter-spacing="8" fill="url(#axonText)">AXON</text>
  <text x="310" y="229" class="terminal">local-first LLM traffic router</text>
  <text x="310" y="265" class="micro">scan - resolve - vault - route</text>

  <path d="M300 299 H850" stroke="#F3F6E8" stroke-opacity="0.18"/>
  <text x="310" y="333" class="micro">route signals, not secrets</text>
  <text x="310" y="357" class="micro">OpenAI-compatible // Anthropic-compatible</text>
</svg>
